# 公開リポジトリの schedule は 60 日無活動で自動無効化される。
# 空コミットで活動を残し、定期実行が止まらないようにする。
name: Keep Alive

on:
  schedule:
    # 毎月1日 03:00 JST (UTC 18:00 前日)
    - cron: '0 18 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Empty commit to keep schedules active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows alive ($(date -u +%Y-%m-%d))"
          git push
