name: Daily XBRL Update

on:
  # GitHub独自のscheduleは遅延が大きいため、本番起動は外部cronのworkflow_dispatchを使う。
  # ここは予備（遅れた場合のキャッチアップ）として残す。
  schedule:
    - cron: '35 2 * * 1-5'    # 11:35 JST
    - cron: '35 6 * * 1-5'    # 15:35 JST
    - cron: '5 8 * * 1-5'     # 17:05 JST
    - cron: '5 11 * * 1-5'    # 20:05 JST
    - cron: '55 14 * * 1-5'   # 23:55 JST
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付（空欄=今日, YYYYMMDD=指定日, "YYYYMMDD YYYYMMDD"=範囲）'
        required: false
        default: ''
      slot:
        description: '実行枠 (1135/1535/1705/2005/2355)。空欄=現在時刻から判定。manual=強制実行（メールあり）'
        required: false
        default: ''
      force:
        description: 'true なら同一枠の再実行を許可'
        required: false
        default: 'false'

jobs:
  # いま実行すべき枠か判定
  gate:
    name: Decide slot
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.final.outputs.should_run }}
      slot: ${{ steps.final.outputs.slot }}
      send_mail: ${{ steps.final.outputs.send_mail }}
      today: ${{ steps.final.outputs.today }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_DATE_INPUT: ${{ github.event.inputs.target_date }}
          SLOT_INPUT: ${{ github.event.inputs.slot }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
        run: |
          python3 <<'PY'
          import os
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          # (slot_id, start_h, start_m, send_mail)
          SLOT_STARTS = [
              ("1135", 11, 35, True),
              ("1535", 15, 35, True),
              ("1705", 17, 5, False),
              ("2005", 20, 5, False),
              ("2355", 23, 55, False),
          ]
          SLOT_MAIL = {s: m for s, _, _, m in SLOT_STARTS}
          VALID = {s for s, _, _, _ in SLOT_STARTS} | {"manual"}

          now = datetime.now(ZoneInfo("Asia/Tokyo"))
          event = os.environ.get("EVENT_NAME", "")
          slot_in = (os.environ.get("SLOT_INPUT") or "").strip().lower()
          force = (os.environ.get("FORCE_INPUT") or "").strip().lower() in ("true", "1", "yes")

          def emit(should_run, slot, send_mail, today, force_flag=False):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"should_run={should_run}\n")
                  f.write(f"slot={slot}\n")
                  f.write(f"send_mail={str(send_mail).lower()}\n")
                  f.write(f"today={today}\n")
                  f.write(f"force={str(force_flag).lower()}\n")
              print(
                  f"decide: should_run={should_run} slot={slot} send_mail={send_mail} "
                  f"force={force_flag} now={now:%Y-%m-%d %H:%M JST} event={event}"
              )

          def today_from_input():
              raw = (os.environ.get("TARGET_DATE_INPUT") or "").strip()
              if not raw:
                  return now.strftime("%Y%m%d")
              return raw.split()[0]

          def choose_from_clock():
              minutes = now.hour * 60 + now.minute
              for i, (slot, h, m, mail) in enumerate(SLOT_STARTS):
                  start = h * 60 + m
                  if i + 1 < len(SLOT_STARTS):
                      end = SLOT_STARTS[i + 1][1] * 60 + SLOT_STARTS[i + 1][2]
                  else:
                      end = 24 * 60 + 60
                  adj = minutes
                  day = now.strftime("%Y%m%d")
                  if slot == "2355" and minutes < 60:
                      adj = minutes + 24 * 60
                      day = (now - timedelta(days=1)).strftime("%Y%m%d")
                  if start <= adj < end:
                      return slot, mail, day
              return None

          # 明示slot指定（外部cron向け）
          if slot_in:
              if slot_in not in VALID:
                  raise SystemExit(f"invalid slot: {slot_in!r}")
              day = today_from_input()
              if slot_in == "manual":
                  emit("true", "manual", True, day, force)
              else:
                  emit("true", slot_in, SLOT_MAIL[slot_in], day, force)
              raise SystemExit(0)

          # 手動でslot未指定: テスト用に常に実行＋メール
          if event == "workflow_dispatch":
              emit("true", "manual", True, today_from_input(), force)
              raise SystemExit(0)

          # schedule: 現在時刻の枠
          chosen = choose_from_clock()
          if not chosen:
              emit("false", "none", False, now.strftime("%Y%m%d"), False)
              raise SystemExit(0)
          slot, mail, day = chosen
          emit("true", slot, mail, day, False)
          PY

      - name: Check if this slot already ran today
        if: steps.decide.outputs.should_run == 'true' && steps.decide.outputs.slot != 'manual' && steps.decide.outputs.force != 'true'
        id: dedup
        uses: actions/cache@v4
        with:
          path: .tdnet-slot-marker
          key: tdnet-slot-${{ steps.decide.outputs.today }}-${{ steps.decide.outputs.slot }}

      - name: Skip if slot already completed
        id: skip
        if: steps.decide.outputs.should_run == 'true' && steps.decide.outputs.slot != 'manual' && steps.decide.outputs.force != 'true' && steps.dedup.outputs.cache-hit == 'true'
        run: |
          echo "Slot ${{ steps.decide.outputs.slot }} already completed for ${{ steps.decide.outputs.today }} — skip"
          echo "should_run=false" >> "$GITHUB_OUTPUT"

      - name: Final should_run
        id: final
        run: |
          if [ "${{ steps.decide.outputs.should_run }}" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.skip.outputs.should_run }}" = "false" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi
          echo "slot=${{ steps.decide.outputs.slot }}" >> "$GITHUB_OUTPUT"
          echo "send_mail=${{ steps.decide.outputs.send_mail }}" >> "$GITHUB_OUTPUT"
          echo "today=${{ steps.decide.outputs.today }}" >> "$GITHUB_OUTPUT"

  update:
    name: Update
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: tdnet-${{ needs.gate.outputs.today }}-${{ needs.gate.outputs.slot }}
      cancel-in-progress: false
    env:
      TZ: Asia/Tokyo
      RUN_SLOT: ${{ needs.gate.outputs.slot }}
      RUN_TODAY: ${{ needs.gate.outputs.today }}

    steps:
      # ── 1. スクリプトを取得（このリポジトリ = tdnet_get） ──
      - uses: actions/checkout@v4

      # ── 2. Python セットアップ ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4 lxml openpyxl yfinance pymupdf

      # ── 3. 今日の日付（JST） ──
      - name: Set target date
        run: |
          INPUT="${{ github.event.inputs.target_date }}"
          if [ -z "$INPUT" ]; then
            echo "TODAY=${{ needs.gate.outputs.today }}" >> $GITHUB_ENV
          else
            echo "TODAY=$INPUT" >> $GITHUB_ENV
          fi
          echo "Running slot=${{ needs.gate.outputs.slot }} send_mail=${{ needs.gate.outputs.send_mail }}"

      # ── 4a. ① TDnet PDFダウンロード ──
      - name: Run PDF downloader
        run: |
          python "①_tdnetアクセスしてダウンロードする処理（月日付別フォルダ保存）.py" \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --page-sleep 2 \
            --pdf-sleep 0.5

      # ── 4b. ②A PDF全文キーワード検索 ──
      - name: Run keyword search
        run: |
          python "②a②bは２つフリーワード検索.py" analyze \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --keywords "価格交渉" "増産" "価格改定" "価格転嫁" "値上" \
              "想定以上" "上方修正" "下方修正" "想定以下" "未達" "大幅" \
              "計画を上" "計画を下" "計画以" \
              "需要回復" "需要の回復" "需要が増" "需要が低" "悪化" \
              "グローバルニッチトップ" "トップシェア" "シェア拡大" "レアアース"

      # ── 4c. ②B 配布用CSV作成 ──
      - name: Create distribution CSV
        run: |
          python "②a②bは２つフリーワード検索.py" distribute \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --no-stop-on-empty-meta
        continue-on-error: true

      # ── 4c2. PDF + CSV を個人 Google Drive へアップロード（PC不要）──
      # Secret RCLONE_CONFIG が無い場合はスキップ（公開ビューア更新は続行）
      - name: Upload PDF/CSV to Google Drive
        continue-on-error: true
        env:
          RCLONE_CONFIG_BODY: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONFIG_BODY:-}" ]; then
            echo "RCLONE_CONFIG secret 未設定のため Drive アップロードをスキップします"
            echo "PCで setup_rclone_gdrive.ps1 を実行し、Secret を登録してください"
            exit 0
          fi

          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONFIG_BODY" > ~/.config/rclone/rclone.conf

          # setup_rclone_gdrive.ps1 で作る remote 名は gdrive
          # 保存先: マイドライブ/TDnet_Downloads （ローカルの G:\マイドライブ\TDnet_Downloads と同じ）
          REMOTE="gdrive:TDnet_Downloads"

          echo "Uploading pdf_tmp → $REMOTE"
          rclone copy ./pdf_tmp "$REMOTE" \
            --create-empty-src-dirs \
            --transfers 8 \
            --checkers 8 \
            --fast-list \
            -v

          echo "Upload done. Listing remote (top-level):"
          rclone lsd "$REMOTE" | tail -n 20 || true

      # ── 4e. ⑥ PDFテキスト抽出 → JSON保存 ──
      - name: Extract PDF text to JSON
        run: |
          python "⑥_pdf_text_extractor.py" \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --out-dir ./text_data \
            --skip-existing

      # ── 4d. ③ XBRL取得 & 分析 → Excel生成 ──
      - name: Run XBRL analyzer
        run: |
          python "③_xbrl_financial_analyzer.py" \
            --target "$TODAY" \
            --save-root ./xbrl_tmp

      # ── 5. viewer リポジトリをクローン（既存データ取得） ──
      - name: Clone viewer repo
        run: |
          git clone https://x-access-token:${{ secrets.VIEWER_PAT }}@github.com/onokazu777/tdnet-viewer.git viewer

      # ── 6. ⑤ JSON変換（新規分のみ） ──
      - name: Export JSON
        env:
          XBRL_DATA_ROOT: ./xbrl_tmp
        run: python "⑤_export_json.py"

      # ── 7. 既存 index.json とマージ ──
      - name: Merge index and copy detail JSONs
        run: |
          python -c "
          import json, shutil, os, datetime, re, glob

          # 既存データ読み込み
          with open('viewer/data/index.json', 'r', encoding='utf-8') as f:
              existing = json.load(f)

          # 新規データ読み込み
          new_index = 'docs/data/index.json'
          if not os.path.exists(new_index):
              print('No new data generated')
              exit(0)

          with open(new_index, 'r', encoding='utf-8') as f:
              new_entries = json.load(f)

          # 重複チェック（detailファイル名で判定）してマージ
          existing_map = {e['detail']: e for e in existing}
          added = 0
          for entry in new_entries:
              if entry['detail'] not in existing_map:
                  existing.append(entry)
                  added += 1
              else:
                  # 既存エントリの株価指標・PDFリンクを更新
                  for k in ('pbr', 'forward_pe', 'div_yield', 'pdf_url'):
                      if k in entry:
                          existing_map[entry['detail']][k] = entry[k]

          print(f'Existing: {len(existing) - added}, New: {added}, Total: {len(existing)}')

          # index.json 更新
          with open('viewer/data/index.json', 'w', encoding='utf-8') as f:
              json.dump(existing, f, ensure_ascii=False, indent=2)

          # 詳細JSONをコピー
          src_dir = 'docs/data/detail'
          dst_dir = 'viewer/data/detail'
          os.makedirs(dst_dir, exist_ok=True)
          if os.path.exists(src_dir):
              for fn in os.listdir(src_dir):
                  src = os.path.join(src_dir, fn)
                  dst = os.path.join(dst_dir, fn)
                  if not os.path.exists(dst):
                      shutil.copy2(src, dst)

          # ②の結果CSVをコピー
          csv_dir = 'viewer/data/search'
          os.makedirs(csv_dir, exist_ok=True)
          for pattern in ['Analysis_Hits_free_word_*.csv', 'PDF_Search_Result_Distribution_free_word_*.csv']:
              for src in glob.glob(os.path.join('pdf_tmp', pattern)):
                  dst = os.path.join(csv_dir, os.path.basename(src))
                  shutil.copy2(src, dst)
                  print(f'Copied search CSV: {os.path.basename(src)}')

          # ⑥のテキストJSONをコピー
          text_dir = 'viewer/data/text'
          os.makedirs(text_dir, exist_ok=True)
          if os.path.isdir('text_data'):
              for fn in os.listdir('text_data'):
                  if fn.startswith('text_') and fn.endswith('.json'):
                      src = os.path.join('text_data', fn)
                      dst = os.path.join(text_dir, fn)
                      shutil.copy2(src, dst)
                      print(f'Copied text JSON: {fn}')

          # テキストJSONの一覧を作成（Streamlitアプリ用）
          text_files = sorted([
              fn.replace('text_', '').replace('.json', '')
              for fn in os.listdir(text_dir)
              if fn.startswith('text_') and fn.endswith('.json')
          ])
          index_path = os.path.join(text_dir, 'index.json')
          with open(index_path, 'w', encoding='utf-8') as f:
              json.dump({'dates': text_files, 'updated': datetime.datetime.now().isoformat(timespec='seconds')}, f, ensure_ascii=False)
          print(f'Text index: {len(text_files)} dates')

          # 半年より古いテキストJSONを削除
          cutoff = (datetime.date.today() - datetime.timedelta(days=180)).strftime('%Y%m%d')
          removed = 0
          for fn in list(os.listdir(text_dir)):
              m = re.match(r'text_(\d{8})\.json$', fn)
              if m and m.group(1) < cutoff:
                  os.remove(os.path.join(text_dir, fn))
                  removed += 1
          if removed:
              print(f'Removed {removed} old text JSONs (before {cutoff})')
          "


      # ── 8. viewer リポジトリにpush ──
      - name: Push to viewer repo
        run: |
          cd viewer
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new data for $TODAY"
          else
            git commit -m "Auto update: $TODAY"
            git push
            echo "Pushed new data for $TODAY"
          fi

      # 同一枠の再実行を防ぐマーカーを保存
      - name: Mark slot completed
        if: success() && needs.gate.outputs.slot != 'manual'
        run: |
          mkdir -p .tdnet-slot-marker
          echo "slot=${{ needs.gate.outputs.slot }}" > .tdnet-slot-marker/done.txt
          echo "finished=$(date -Is)" >> .tdnet-slot-marker/done.txt

      - name: Save slot marker
        if: success() && needs.gate.outputs.slot != 'manual'
        uses: actions/cache/save@v4
        with:
          path: .tdnet-slot-marker
          key: tdnet-slot-${{ needs.gate.outputs.today }}-${{ needs.gate.outputs.slot }}

  # 11:35 / 15:35（および手動実行）のときだけ完了メールを送る
  notify:
    name: Notify by email
    needs: [gate, update]
    if: >
      always() &&
      !cancelled() &&
      needs.gate.outputs.should_run == 'true' &&
      needs.gate.outputs.send_mail == 'true' &&
      needs.update.result != 'skipped'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      MAIL_SMTP_SERVER: ${{ secrets.MAIL_SMTP_SERVER }}
      MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      UPDATE_RESULT: ${{ needs.update.result }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      WORKFLOW_NAME: ${{ github.workflow }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Send completion email
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import smtplib
          import ssl
          from email.message import EmailMessage
          from datetime import datetime
          from zoneinfo import ZoneInfo

          server = (os.environ.get("MAIL_SMTP_SERVER") or "").strip()
          port_raw = (os.environ.get("MAIL_SMTP_PORT") or "587").strip() or "587"
          username = (os.environ.get("MAIL_USERNAME") or "").strip()
          # アプリパスワードに含まれるスペースを除去
          password = (os.environ.get("MAIL_PASSWORD") or "").replace(" ", "").strip()
          to_addr = "ono@links-research.com"

          if not (server and username and password):
              print("MAIL_* secrets が未設定のため、完了メールをスキップします")
              print("必要: MAIL_SMTP_SERVER / MAIL_SMTP_PORT / MAIL_USERNAME / MAIL_PASSWORD")
              raise SystemExit(0)

          try:
              port = int(port_raw)
          except ValueError:
              raise SystemExit(f"MAIL_SMTP_PORT が不正です: {port_raw!r}")

          now = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y-%m-%d %H:%M JST")
          target = (os.environ.get("TARGET_DATE_INPUT") or "").strip() or f"{datetime.now(ZoneInfo('Asia/Tokyo')).strftime('%Y%m%d')}（今日）"
          ok = os.environ.get("UPDATE_RESULT") == "success"

          if ok:
              status = "成功"
              subject = f"【tdnet】更新しました。チェックしてください（{now}）"
              intro = "日次更新が完了しました。内容を確認してください。"
          else:
              status = "失敗"
              subject = f"【tdnet】更新に失敗しました。チェックしてください（{now}）"
              intro = "日次更新が失敗しました。Actionsログを確認してください。"

          body = "\n".join([
              intro,
              "",
              f"結果: {status}",
              f"対象: {target}",
              f"完了時刻: {now}",
              f"実行: {os.environ.get('EVENT_NAME', '')}",
              f"ワークフロー: {os.environ.get('WORKFLOW_NAME', '')}",
              f"Run: {os.environ.get('RUN_URL', '')}",
              "Viewer: https://onokazu777.github.io/tdnet-viewer/",
              "Drive: Google Drive の TDnet_Downloads",
          ])

          msg = EmailMessage()
          msg["Subject"] = subject
          msg["From"] = f"TDnet Update <{username}>"
          msg["To"] = to_addr
          msg.set_content(body)

          print(f"SMTP server={server} port={port} user={username} to={to_addr}")
          print(f"password_length={len(password)} (spaces stripped)")

          try:
              if port == 465:
                  context = ssl.create_default_context()
                  with smtplib.SMTP_SSL(server, port, context=context, timeout=60) as smtp:
                      smtp.login(username, password)
                      smtp.send_message(msg)
              else:
                  with smtplib.SMTP(server, port, timeout=60) as smtp:
                      smtp.ehlo()
                      smtp.starttls(context=ssl.create_default_context())
                      smtp.ehlo()
                      smtp.login(username, password)
                      smtp.send_message(msg)
          except smtplib.SMTPAuthenticationError as exc:
              print("SMTP認証に失敗しました (535 BadCredentials)。")
              print("確認事項:")
              print("1. MAIL_USERNAME は送信元 Gmail（例: ono.happy@gmail.com）")
              print("2. MAIL_PASSWORD は通常パスワードではなく、16桁のアプリパスワード")
              print("3. アプリパスワードはスペースなしで登録（このスクリプトでも除去します）")
              print("4. https://myaccount.google.com/apppasswords で送信元アカウントのものを発行")
              print("5. MAIL_SMTP_PORT は 587 を推奨（smtp.gmail.com）")
              raise SystemExit(f"SMTPAuthenticationError: {exc}") from exc

          print("Completion email sent.")
          PY
