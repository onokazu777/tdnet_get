name: Daily XBRL Update

on:
  schedule:
    # JST 15:35, 17:05, 20:05, 23:55 (UTC 06:35, 08:05, 11:05, 14:55) ※平日のみ
    - cron: '35 6 * * 1-5'
    - cron: '5 8 * * 1-5'
    - cron: '5 11 * * 1-5'
    - cron: '55 14 * * 1-5'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付（空欄=今日, YYYYMMDD=指定日, "YYYYMMDD YYYYMMDD"=範囲）'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    steps:
      # ── 1. スクリプトを取得（このリポジトリ = tdnet_get） ──
      - uses: actions/checkout@v4

      # ── 2. Python セットアップ ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4 lxml openpyxl yfinance pymupdf

      # ── 3. 今日の日付（JST） ──
      - name: Set target date
        run: |
          INPUT="${{ github.event.inputs.target_date }}"
          if [ -z "$INPUT" ]; then
            echo "TODAY=$(date +%Y%m%d)" >> $GITHUB_ENV
          else
            echo "TODAY=$INPUT" >> $GITHUB_ENV
          fi

      # ── 4a. ① TDnet PDFダウンロード ──
      - name: Run PDF downloader
        run: |
          python "①_tdnetアクセスしてダウンロードする処理（月日付別フォルダ保存）.py" \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --page-sleep 2 \
            --pdf-sleep 0.5

      # ── 4b. ②A PDF全文キーワード検索 ──
      - name: Run keyword search
        run: |
          python "②a②bは２つフリーワード検索.py" analyze \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --keywords "価格交渉" "増産" "価格改定" "価格転嫁" "値上" \
              "想定以上" "上方修正" "下方修正" "想定以下" "未達" "大幅" \
              "計画を上" "計画を下" "計画以" \
              "需要回復" "需要の回復" "需要が増" "需要が低" "悪化" \
              "グローバルニッチトップ" "トップシェア" "シェア拡大" "レアアース"

      # ── 4c. ②B 配布用CSV作成 ──
      - name: Create distribution CSV
        run: |
          python "②a②bは２つフリーワード検索.py" distribute \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --no-stop-on-empty-meta
        continue-on-error: true

      # ── 4c2. PDF + CSV を個人 Google Drive へアップロード（PC不要）──
      # Secret RCLONE_CONFIG が無い場合はスキップ（公開ビューア更新は続行）
      - name: Upload PDF/CSV to Google Drive
        continue-on-error: true
        env:
          RCLONE_CONFIG_BODY: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONFIG_BODY:-}" ]; then
            echo "RCLONE_CONFIG secret 未設定のため Drive アップロードをスキップします"
            echo "PCで setup_rclone_gdrive.ps1 を実行し、Secret を登録してください"
            exit 0
          fi

          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONFIG_BODY" > ~/.config/rclone/rclone.conf

          # setup_rclone_gdrive.ps1 で作る remote 名は gdrive
          # 保存先: マイドライブ/TDnet_Downloads （ローカルの G:\マイドライブ\TDnet_Downloads と同じ）
          REMOTE="gdrive:TDnet_Downloads"

          echo "Uploading pdf_tmp → $REMOTE"
          rclone copy ./pdf_tmp "$REMOTE" \
            --create-empty-src-dirs \
            --transfers 8 \
            --checkers 8 \
            --fast-list \
            -v

          echo "Upload done. Listing remote (top-level):"
          rclone lsd "$REMOTE" | tail -n 20 || true

      # ── 4e. ⑥ PDFテキスト抽出 → JSON保存 ──
      - name: Extract PDF text to JSON
        run: |
          python "⑥_pdf_text_extractor.py" \
            --target "$TODAY" \
            --save-root ./pdf_tmp \
            --out-dir ./text_data \
            --skip-existing

      # ── 4d. ③ XBRL取得 & 分析 → Excel生成 ──
      - name: Run XBRL analyzer
        run: |
          python "③_xbrl_financial_analyzer.py" \
            --target "$TODAY" \
            --save-root ./xbrl_tmp

      # ── 5. viewer リポジトリをクローン（既存データ取得） ──
      - name: Clone viewer repo
        run: |
          git clone https://x-access-token:${{ secrets.VIEWER_PAT }}@github.com/onokazu777/tdnet-viewer.git viewer

      # ── 6. ⑤ JSON変換（新規分のみ） ──
      - name: Export JSON
        env:
          XBRL_DATA_ROOT: ./xbrl_tmp
        run: python "⑤_export_json.py"

      # ── 7. 既存 index.json とマージ ──
      - name: Merge index and copy detail JSONs
        run: |
          python -c "
          import json, shutil, os, datetime, re, glob

          # 既存データ読み込み
          with open('viewer/data/index.json', 'r', encoding='utf-8') as f:
              existing = json.load(f)

          # 新規データ読み込み
          new_index = 'docs/data/index.json'
          if not os.path.exists(new_index):
              print('No new data generated')
              exit(0)

          with open(new_index, 'r', encoding='utf-8') as f:
              new_entries = json.load(f)

          # 重複チェック（detailファイル名で判定）してマージ
          existing_map = {e['detail']: e for e in existing}
          added = 0
          for entry in new_entries:
              if entry['detail'] not in existing_map:
                  existing.append(entry)
                  added += 1
              else:
                  # 既存エントリの株価指標・PDFリンクを更新
                  for k in ('pbr', 'forward_pe', 'div_yield', 'pdf_url'):
                      if k in entry:
                          existing_map[entry['detail']][k] = entry[k]

          print(f'Existing: {len(existing) - added}, New: {added}, Total: {len(existing)}')

          # index.json 更新
          with open('viewer/data/index.json', 'w', encoding='utf-8') as f:
              json.dump(existing, f, ensure_ascii=False, indent=2)

          # 詳細JSONをコピー
          src_dir = 'docs/data/detail'
          dst_dir = 'viewer/data/detail'
          os.makedirs(dst_dir, exist_ok=True)
          if os.path.exists(src_dir):
              for fn in os.listdir(src_dir):
                  src = os.path.join(src_dir, fn)
                  dst = os.path.join(dst_dir, fn)
                  if not os.path.exists(dst):
                      shutil.copy2(src, dst)

          # ②の結果CSVをコピー
          csv_dir = 'viewer/data/search'
          os.makedirs(csv_dir, exist_ok=True)
          for pattern in ['Analysis_Hits_free_word_*.csv', 'PDF_Search_Result_Distribution_free_word_*.csv']:
              for src in glob.glob(os.path.join('pdf_tmp', pattern)):
                  dst = os.path.join(csv_dir, os.path.basename(src))
                  shutil.copy2(src, dst)
                  print(f'Copied search CSV: {os.path.basename(src)}')

          # ⑥のテキストJSONをコピー
          text_dir = 'viewer/data/text'
          os.makedirs(text_dir, exist_ok=True)
          if os.path.isdir('text_data'):
              for fn in os.listdir('text_data'):
                  if fn.startswith('text_') and fn.endswith('.json'):
                      src = os.path.join('text_data', fn)
                      dst = os.path.join(text_dir, fn)
                      shutil.copy2(src, dst)
                      print(f'Copied text JSON: {fn}')

          # テキストJSONの一覧を作成（Streamlitアプリ用）
          text_files = sorted([
              fn.replace('text_', '').replace('.json', '')
              for fn in os.listdir(text_dir)
              if fn.startswith('text_') and fn.endswith('.json')
          ])
          index_path = os.path.join(text_dir, 'index.json')
          with open(index_path, 'w', encoding='utf-8') as f:
              json.dump({'dates': text_files, 'updated': datetime.datetime.now().isoformat(timespec='seconds')}, f, ensure_ascii=False)
          print(f'Text index: {len(text_files)} dates')

          # 半年より古いテキストJSONを削除
          cutoff = (datetime.date.today() - datetime.timedelta(days=180)).strftime('%Y%m%d')
          removed = 0
          for fn in list(os.listdir(text_dir)):
              m = re.match(r'text_(\d{8})\.json$', fn)
              if m and m.group(1) < cutoff:
                  os.remove(os.path.join(text_dir, fn))
                  removed += 1
          if removed:
              print(f'Removed {removed} old text JSONs (before {cutoff})')
          "


      # ── 8. viewer リポジトリにpush ──
      - name: Push to viewer repo
        run: |
          cd viewer
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new data for $TODAY"
          else
            git commit -m "Auto update: $TODAY"
            git push
            echo "Pushed new data for $TODAY"
          fi

  # 成功・失敗どちらでも完了メールを送る（Secrets未設定ならスキップ）
  notify:
    name: Notify by email
    needs: update
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      MAIL_SMTP_SERVER: ${{ secrets.MAIL_SMTP_SERVER }}
      MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      UPDATE_RESULT: ${{ needs.update.result }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      WORKFLOW_NAME: ${{ github.workflow }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Send completion email
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import smtplib
          import ssl
          from email.message import EmailMessage
          from datetime import datetime
          from zoneinfo import ZoneInfo

          server = (os.environ.get("MAIL_SMTP_SERVER") or "").strip()
          port_raw = (os.environ.get("MAIL_SMTP_PORT") or "587").strip() or "587"
          username = (os.environ.get("MAIL_USERNAME") or "").strip()
          # アプリパスワードに含まれるスペースを除去
          password = (os.environ.get("MAIL_PASSWORD") or "").replace(" ", "").strip()
          to_addr = "ono@links-research.com"

          if not (server and username and password):
              print("MAIL_* secrets が未設定のため、完了メールをスキップします")
              print("必要: MAIL_SMTP_SERVER / MAIL_SMTP_PORT / MAIL_USERNAME / MAIL_PASSWORD")
              raise SystemExit(0)

          try:
              port = int(port_raw)
          except ValueError:
              raise SystemExit(f"MAIL_SMTP_PORT が不正です: {port_raw!r}")

          now = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y-%m-%d %H:%M JST")
          target = (os.environ.get("TARGET_DATE_INPUT") or "").strip() or f"{datetime.now(ZoneInfo('Asia/Tokyo')).strftime('%Y%m%d')}（今日）"
          ok = os.environ.get("UPDATE_RESULT") == "success"

          if ok:
              status = "成功"
              subject = f"【tdnet】更新しました。チェックしてください（{now}）"
              intro = "日次更新が完了しました。内容を確認してください。"
          else:
              status = "失敗"
              subject = f"【tdnet】更新に失敗しました。チェックしてください（{now}）"
              intro = "日次更新が失敗しました。Actionsログを確認してください。"

          body = "\n".join([
              intro,
              "",
              f"結果: {status}",
              f"対象: {target}",
              f"完了時刻: {now}",
              f"実行: {os.environ.get('EVENT_NAME', '')}",
              f"ワークフロー: {os.environ.get('WORKFLOW_NAME', '')}",
              f"Run: {os.environ.get('RUN_URL', '')}",
              "Viewer: https://onokazu777.github.io/tdnet-viewer/",
              "Drive: Google Drive の TDnet_Downloads",
          ])

          msg = EmailMessage()
          msg["Subject"] = subject
          msg["From"] = f"TDnet Update <{username}>"
          msg["To"] = to_addr
          msg.set_content(body)

          print(f"SMTP server={server} port={port} user={username} to={to_addr}")
          print(f"password_length={len(password)} (spaces stripped)")

          try:
              if port == 465:
                  context = ssl.create_default_context()
                  with smtplib.SMTP_SSL(server, port, context=context, timeout=60) as smtp:
                      smtp.login(username, password)
                      smtp.send_message(msg)
              else:
                  with smtplib.SMTP(server, port, timeout=60) as smtp:
                      smtp.ehlo()
                      smtp.starttls(context=ssl.create_default_context())
                      smtp.ehlo()
                      smtp.login(username, password)
                      smtp.send_message(msg)
          except smtplib.SMTPAuthenticationError as exc:
              print("SMTP認証に失敗しました (535 BadCredentials)。")
              print("確認事項:")
              print("1. MAIL_USERNAME は送信元 Gmail（例: ono.happy@gmail.com）")
              print("2. MAIL_PASSWORD は通常パスワードではなく、16桁のアプリパスワード")
              print("3. アプリパスワードはスペースなしで登録（このスクリプトでも除去します）")
              print("4. https://myaccount.google.com/apppasswords で送信元アカウントのものを発行")
              print("5. MAIL_SMTP_PORT は 587 を推奨（smtp.gmail.com）")
              raise SystemExit(f"SMTPAuthenticationError: {exc}") from exc

          print("Completion email sent.")
          PY
